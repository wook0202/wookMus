<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Blue Endurance | Premium Edition</title>
    
    <link rel="icon" href="test.png" type="image/png">
    <link rel="apple-touch-icon" href="test.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            /* 업로드하신 블루 이미지 컬러 적용 */
            --v-brand-blue: #00249C; 
            --v-deep-navy: #000B2E; /* 배경용 더 어두운 블루 */
            --v-accent: #4D7BFF; /* 대비를 위한 밝은 블루 */
            --v-text: #E0F2FF;
        }

        /* 움직이는 배경: 브랜드 블루 톤으로 변경 */
        body { 
            margin: 0;
            background: linear-gradient(125deg, var(--v-deep-navy), var(--v-brand-blue), #1B263B, var(--v-deep-navy));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--v-text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
            font-family: 'Pretendard', sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 글래스모피즘 컨테이너 */
        .container { 
            width: 100%; max-width: 440px; padding: 40px 30px; 
            background: rgba(0, 36, 156, 0.1); /* 브랜드 컬러 투명도 적용 */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .motto { 
            font-weight: 200; letter-spacing: 1.5px; font-size: 0.95rem; 
            color: var(--v-accent); margin-bottom: 25px; opacity: 0.9;
        }

        /* 테이프 데크 */
        .tape-deck {
            width: 100%; aspect-ratio: 1.5 / 1; 
            background: #050505; border-radius: 20px; padding: 15px;
            position: relative; transition: 0.5s;
            border: 1px solid rgba(0, 36, 156, 0.4);
        }

        .tape-deck.playing {
            box-shadow: 0 0 30px rgba(0, 36, 156, 0.5);
            border-color: var(--v-accent);
        }

        /* 테이프 라벨 컬러를 브랜드 블루로 수정 */
        .tape-label {
            width: 100%; height: 100%; 
            background: var(--v-brand-blue); 
            border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        .tape-window {
            z-index: 2; width: 65%; height: 30%; background: rgba(0,0,0,0.7); 
            border-radius: 8px; display: flex; justify-content: space-around; 
            align-items: center; border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .reel { width: 40px; height: 40px; border: 3px dashed #fff; border-radius: 50%; opacity: 0.7; }
        .spinning { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .tape-controls { z-index: 3; display: flex; gap: 20px; margin-top: 15px; }
        .btn-inner {
            background: rgba(0, 0, 0, 0.4); border: none;
            color: #fff; width: 48px; height: 48px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .btn-inner:hover { transform: scale(1.1); background: var(--v-accent); }

        .tape-title { z-index: 2; color: #fff; font-size: 0.85rem; font-weight: 600; margin-top: 12px; }

        /* 트랙 리스트 */
        .track-menu { text-align: left; margin-top: 35px; width: 100%; }
        .track-row {
            display: flex; align-items: center; padding: 15px 15px;
            border-radius: 12px; margin-bottom: 8px;
            cursor: pointer; transition: 0.3s;
            background: rgba(255, 255, 255, 0.03);
        }
        .track-row:hover { background: rgba(0, 36, 156, 0.3); }
        .track-row.active { 
            background: rgba(0, 36, 156, 0.6); 
            border-left: 4px solid var(--v-accent);
        }
        .track-row .no { width: 35px; font-size: 0.8rem; font-weight: 800; color: var(--v-accent); }
        .track-row .title { font-size: 1rem; }

    </style>
</head>
<body>

<div class="container">
    <div class="motto">“Sometimes courage means holding on.”</div>

    <div class="tape-deck" id="deck">
        <div class="tape-label">
            <div class="tape-window">
                <div class="reel" id="reelL"></div>
                <div class="reel" id="reelR"></div>
            </div>
            
            <div class="tape-controls">
                <button class="btn-inner" onclick="pauseMusic()"><span class="material-icons">pause</span></button>
                <button class="btn-inner" onclick="playMusic()"><span class="material-icons">play_arrow</span></button>
            </div>
            
            <div class="tape-title" id="tapeTitle">READY TO DIVE</div>
        </div>
    </div>

    <div class="track-menu">
        <div class="track-row" onclick="playTrack(1, '침묵의 부력 (Intro)')"><span class="no">01</span><span class="title">침묵의 부력 (Intro)</span></div>
        <div class="track-row" onclick="playTrack(2, '파란 환각')"><span class="no">02</span><span class="title">파란 환각</span></div>
        <div class="track-row" onclick="playTrack(3, '거울의 뒷면 (Title)')"><span class="no">03</span><span class="title">거울의 뒷면 (Title)</span></div>
        <div class="track-row" onclick="playTrack(4, '고속도로의 밤')"><span class="no">04</span><span class="title">고속도로의 밤</span></div>
        <div class="track-row" onclick="playTrack(5, '수면 위로 (Outro)')"><span class="no">05</span><span class="title">수면 위로 (Outro)</span></div>
    </div>
</div>

<script>
    let audio = new Audio();
    let currentTitle = "";

    function playTrack(n, title) {
        currentTitle = title;
        if(n === 1) {
            audio.src = "track1.mp3"; 
        } else { 
            audio.src = ""; 
            alert(title + " 트랙의 음악 파일이 준비되지 않았습니다.");
            pauseMusic();
            return;
        }
        document.querySelectorAll('.track-row').forEach((r, i) => r.classList.toggle('active', i === n-1));
        playMusic();
    }

    function playMusic() {
        if(!audio.src) {
            playTrack(1, '침묵의 부력 (Intro)');
            return;
        }
        audio.play().then(() => {
            document.getElementById('deck').classList.add('playing');
            document.getElementById('reelL').classList.add('spinning');
            document.getElementById('reelR').classList.add('spinning');
            document.getElementById('tapeTitle').innerText = currentTitle;
        });
    }

    function pauseMusic() {
        audio.pause();
        document.getElementById('deck').classList.remove('playing');
        document.getElementById('reelL').classList.remove('spinning');
        document.getElementById('reelR').classList.remove('spinning');
    }

    audio.onended = function() {
        pauseMusic();
        document.getElementById('tapeTitle').innerText = "FINISHED";
    };
</script>

</body>
</html>
