<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Blue Endurance | Sometimes Courage...</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --v-blue: #3A5A78;
            --v-navy: #0A192F;
            --v-bg: #050A18;
            --v-accent: #4DA3FF;
            --v-text: #E0F2FF;
        }

        /* 움직이는 배경 */
        body { 
            margin: 0;
            background: linear-gradient(125deg, #050A18, #0A192F, #1B263B, #050A18);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--v-text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 애플뮤직 스타일의 글래스모피즘 컨테이너 */
        .container { 
            width: 100%; max-width: 480px; padding: 40px 30px; 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* 최상단 좌우정렬된 문구 (삭제됨) */

        /* 수정된 모토: 컨테이너 정중앙 */
        .motto { 
            font-weight: 200; letter-spacing: 2px; font-size: 0.95rem; 
            color: var(--v-accent); 
            margin-bottom: 25px; /* 테이프와 간격 */
            margin-top: 15px; /* 상단 간격 */
            display: flex; justify-content: center;
            opacity: 0.9;
        }

        /* 재생 중일 때 빛나는 효과 */
        .tape-deck {
            width: 100%; aspect-ratio: 1.5 / 1; 
            background: #111; border-radius: 20px; padding: 15px;
            position: relative; transition: 0.5s;
            border: 1px solid rgba(77, 163, 255, 0.2);
            /* 테이프를 글래스모피즘 컨테이너의 중앙에 배치하기 위해 margin auto */
            margin-left: auto; margin-right: auto;
        }

        .tape-deck.playing {
            box-shadow: 0 0 30px rgba(77, 163, 255, 0.3);
            border-color: var(--v-accent);
        }

        .tape-label {
            width: 100%; height: 100%; background: var(--v-blue); border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        /* 카세트 윈도우 및 릴 */
        .tape-window {
            z-index: 2; width: 65%; height: 30%; background: rgba(0,0,0,0.6); 
            border-radius: 8px; display: flex; justify-content: space-around; 
            align-items: center; border: 1px solid rgba(77, 163, 255, 0.4);
        }

        .reel { 
            width: 40px; height: 40px; border: 3px dashed var(--v-accent); 
            border-radius: 50%; transition: 0.5s;
        }

        .spinning { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 내부 컨트롤러 */
        .tape-controls { z-index: 3; display: flex; gap: 20px; margin-top: 15px; }
        .btn-inner {
            background: rgba(0, 0, 0, 0.5); border: none;
            color: #fff; width: 44px; height: 44px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .btn-inner:hover { transform: scale(1.1); background: var(--v-accent); }

        .tape-title { 
            z-index: 2; color: #fff; font-size: 0.8rem; font-weight: 600; 
            margin-top: 12px; letter-spacing: 1px;
        }

        /* 트랙 리스트 스타일업 */
        .track-menu { text-align: left; margin-top: 35px; }
        .track-row {
            display: flex; align-items: center; padding: 15px 10px;
            border-radius: 12px; margin-bottom: 5px;
            cursor: pointer; transition: 0.2s;
        }
        .track-row:hover { background: rgba(77, 163, 255, 0.1); }
        .track-row.active { background: rgba(77, 163, 255, 0.2); color: var(--v-accent); }
        .track-row .no { width: 35px; font-size: 0.8rem; font-weight: 800; }
        .track-row .title { font-size: 1rem; }

/* --- womusic.html 파일의 <style> 태그 안에서 수정 --- */

.container { 
    width: 100%; max-width: 480px; padding: 40px 30px; 
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    text-align: center;

    /* --- 테이프 이미지를 정중앙에 위치시키기 위해 추가 --- */
    display: flex; /* flexbox 레이아웃 사용 */
    flex-direction: column; /* 세로 방향으로 정렬 */
    justify-content: center; /* 세로축 중앙 정렬 */
    align-items: center; /* 가로축 중앙 정렬 */
}

/* 아래는 기존 테이프 이미지 스타일입니다. margin 마무리를 위한 수정입니다. */
.tape-deck {
    width: 100%; aspect-ratio: 1.5 / 1; 
    background: #111; border-radius: 20px; padding: 15px;
    position: relative; transition: 0.5s;
    border: 1px solid rgba(77, 163, 255, 0.2);
    
    /* margin-left, right를 제거하고 flexbox 중앙 정렬에 맡깁니다. */
    margin-left: 0; margin-right: 0; 
}

    </style>
</head>
<body>

<div class="container">
    <div class="motto">“Sometimes courage means holding on.”</div>

    <div class="tape-deck" id="deck">
        <div class="tape-label">
            <div class="tape-window">
                <div class="reel" id="reelL"></div>
                <div class="reel" id="reelR"></div>
            </div>
            
            <div class="tape-controls">
                <button class="btn-inner" onclick="pauseMusic()"><span class="material-icons">pause</span></button>
                <button class="btn-inner" onclick="playMusic()"><span class="material-icons">play_arrow</span></button>
            </div>
            
            <div class="tape-title" id="tapeTitle">READY TO DIVE</div>
        </div>
    </div>

    <div class="track-menu">
        <div class="track-row" onclick="playTrack(1, '침묵의 부력 (Intro)')"><span class="no">01</span><span class="title">침묵의 부력 (Intro)</span></div>
        <div class="track-row" onclick="playTrack(2, '파란 환각')"><span class="no">02</span><span class="title">파란 환각</span></div>
        <div class="track-row" onclick="playTrack(3, '거울의 뒷면 (Title)')"><span class="no">03</span><span class="title">거울의 뒷면 (Title)</span></div>
        <div class="track-row" onclick="playTrack(4, '고속도로의 밤')"><span class="no">04</span><span class="title">고속도로의 밤</span></div>
        <div class="track-row" onclick="playTrack(5, '수면 위로 (Outro)')"><span class="no">05</span><span class="title">수면 위로 (Outro)</span></div>
    </div>
</div>

<script>
    let audio = new Audio();
    let currentTitle = "";

    function playTrack(n, title) {
        currentTitle = title;
        if(n === 1) {
            audio.src = "track1.mp3"; 
        }
        else { 
            audio.src = ""; 
            alert(title + " 트랙의 음악 파일이 준비되지 않았습니다.");
            pauseMusic();
            return;
        }

        document.querySelectorAll('.track-row').forEach((r, i) => r.classList.toggle('active', i === n-1));
        playMusic();
    }

    function playMusic() {
        if(!audio.src) {
            // 아무 트랙도 안 골랐을 때 재생 누르면 1번 트랙 시작
            playTrack(1, '침묵의 부력 (Intro)');
            return;
        }
        audio.play().then(() => {
            document.getElementById('deck').classList.add('playing');
            document.getElementById('reelL').classList.add('spinning');
            document.getElementById('reelR').classList.add('spinning');
            document.getElementById('tapeTitle').innerText = currentTitle;
        }).catch(e => console.error("재생 오류:", e));
    }

    function pauseMusic() {
        audio.pause();
        document.getElementById('deck').classList.remove('playing');
        document.getElementById('reelL').classList.remove('spinning');
        document.getElementById('reelR').classList.remove('spinning');
    }

    // 음악이 끝나면 릴 회전 멈춤
    audio.onended = function() {
        pauseMusic();
        document.getElementById('tapeTitle').innerText = "FINISHED";
    };
</script>

</body>
</html>
